<!DOCTYPE html>
<html>

<input id="name" placeholder="Name">
<br><br>

<textarea id="problem" placeholder="Problem"></textarea>
<br><br>

<button onclick="send()">Send</button>

<script>

function send(){

fetch("https://script.google.com/macros/s/AKfycbxDg1g9TPA7zl4GZulzinVQ7n7P8RLU6qeMyQ2I27GfOsmY2jNtX0Rqu3-KTLIK6T4W/exec",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
name: document.getElementById("name").value,
problem: document.getElementById("problem").value
})
})

.then(r=>r.json())
.then(res=>{
alert("sent");
})

.catch(err=>{
console.log(err);
alert("error");
})

}

</script>

</html>
